name: Fork PR - Convert Hourly to Daily Rate

on:
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create branch
        run: |
          git checkout -b feature/daily-rate-update

      - name: Run refactor script
        run: |
          python scripts/update_to_daily_rate.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Refactor: switch from hourly rate to daily rate"

      - name: Push branch to fork
        run: |
          git push origin feature/daily-rate-update

      - name: Create Pull Request to upstream
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: feature/daily-rate-update
          title: "Refactor: Hourly → Daily wage calculation"
          body: |
            This PR updates the wage calculation:
            - Replaces hourly rate with daily rate (£80/day)
            - Updates variable names (hours → days)
            - Uses safer scripted refactoring
          base: main
          # IMPORTANT: specify upstream repo
          repository: original-owner/wage-project
